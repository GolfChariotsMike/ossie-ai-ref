<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ossie AI Ref</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; color: #f1f5f9; font-family: system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 20px; }
.card { background: #1e293b; border-radius: 12px; padding: 32px; width: 240px; text-decoration: none; color: inherit; border: 1px solid #334155; transition: border-color 0.2s, transform 0.2s; }
.card:hover { border-color: #f97316; transform: translateY(-2px); }
.card .icon { font-size: 2.5rem; margin-bottom: 12px; }
.card h2 { font-size: 1rem; color: #f97316; margin-bottom: 8px; }
.card p { font-size: 0.8rem; color: #94a3b8; }
h1 { text-align: center; color: #f97316; margin-bottom: 8px; font-size: 1.4rem; }
.sub { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 32px; }
.container { width: 100%; max-width: 600px; }
</style>
</head>
<body>
<div class="container">
  <h1>🏐 Ossie AI Ref</h1>
  <p class="sub">AI-powered automated referee system for Ossie Indoor Beach Volleyball</p>
  <div class="cards">
    <a class="card" href="player.html">
      <div class="icon">▶</div>
      <h2>Test Player</h2>
      <p>Load a video + tracking CSV, set net boundaries, watch the AI score in real time</p>
    </a>
    <a class="card" href="calibrate.html">
      <div class="icon">⊹</div>
      <h2>Calibrate Court</h2>
      <p>Click net boundary points on a court frame to generate a calibration JSON</p>
    </a>
  </div>
</div>
</body>
</html>
